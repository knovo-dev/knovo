                    - text: Share on X
                - link "LinkedIn" [ref=e51] [cursor=pointer]:
                  - /url: https://www.linkedin.com/sharing/share-offsite/?url=https%3A%2F%2Fknovo.ai%2Fguides%2Fprompt-engineering-guide
                  - button "LinkedIn" [ref=e52]:
